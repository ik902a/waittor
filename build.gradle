plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.5' apply false
    id 'io.spring.dependency-management' version '1.1.7' apply false
}

allprojects {
    group = 'by.klihal'
    version = '0.0.1-SNAPSHOT'
    description = 'waittor'
}

subprojects {
    apply plugin: 'java'
    apply plugin: 'org.springframework.boot'
    apply plugin: 'io.spring.dependency-management'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(21)
        }
    }

    repositories {
        mavenCentral()
    }
    dependencyManagement {
        imports {
            mavenBom "org.springframework.boot:spring-boot-dependencies:4.0.5"
        }

        dependencies {
//            implementation 'org.springframework.boot:spring-boot-starter'

            //database
            dependency 'org.postgresql:r2dbc-postgresql:1.1.1.RELEASE'

            dependency 'org.jsoup:jsoup:1.22.1'
            dependency 'com.google.guava:guava:33.6.0-jre'
            dependency 'org.mapstruct:mapstruct:1.6.3'
            dependency 'org.mapstruct:mapstruct-processor:1.6.3'
//            implementation("org.thymeleaf.extras:thymeleaf-extras-springsecurity6:3.1.5.RELEASE")
            dependency 'io.jsonwebtoken:jjwt-api:0.13.0'
            dependency 'io.jsonwebtoken:jjwt-impl:0.13.0'
            dependency 'io.jsonwebtoken:jjwt-jackson:0.13.0'
//
            dependency 'org.junit.platform:junit-platform-launcher:6.0.3'
        }
    }
    dependencies {
        //spring
        implementation 'org.springframework.boot:spring-boot-starter-validation'

        implementation 'com.google.guava:guava'

        //test
        testImplementation 'org.springframework.boot:spring-boot-starter-test'
        testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    }

    tasks.named('test') {
        useJUnitPlatform()
    }
}

version: '3.8'
services:
  postgres:
    image: postgres:18-alpine
    container_name: tor_container
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
      POSTGRES_DB: tor_db
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d tor_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka_container
    ports:
      - "9092:9092"
    environment:
      # Настройки узла в режиме KRaft (совмещенная роль брокера и контроллера)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      # Слушатели: один внутренний для KRaft, второй внешний для ваших Java-приложений
      # 1. Задаем разные имена для портов: 9092 для хоста, 9094 для Java-приложения, 9093 для KRaft
      KAFKA_LISTENERS: 'EXTERNAL://0.0.0.0:9092,CLIENT://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093'
      # 2. Теперь у каждого имени ровно один уникальный адрес:
      KAFKA_ADVERTISED_LISTENERS: 'EXTERNAL://localhost:9092,CLIENT://kafka:9094'
      # 3. Маппим новые имена на стандартный протокол PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'EXTERNAL:PLAINTEXT,CLIENT:PLAINTEXT,CONTROLLER:PLAINTEXT'
      # 4. Указываем, какой листенер брокеры используют для связи между собой
      KAFKA_INTER_BROKER_LISTENER_NAME: 'CLIENT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      # Автоматическая генерация ID кластера при старте контейнера
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      # Оптимизация для локальной разработки (один реплик-фактор)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-cluster.sh cluster-id --bootstrap-server localhost:9094 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
  ollama-qwen: #TODO need time for loading. Don't have healthcheck
    image: ollama/ollama
    container_name: ollama_container
    ports:
      - "11481:11434"
    volumes:
      - ollama_qwen_data:/root/.ollama
    entrypoint: >
      /bin/sh -c "
        ollama serve &
        sleep 2 &&
        ollama pull qwen2.5-coder:1.5b &&
        wait
      "
  data-api:
    build:
      context: .
      dockerfile: ./data-api/Dockerfile
    container_name: data-api
    ports:
      - "8091:8080"
    depends_on:
      postgres:
        condition: service_healthy # Ждет, пока база будет реально готова
      kafka:
        condition: service_healthy
    environment:
      TOR_LOGIN: ${TOR_LOGIN}
      TOR_PASS: ${TOR_PASS}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASS: ${POSTGRES_PASS}
      PG_HOST: postgres
      PG_PORT: 5432
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
  notification-api:
    build:
      context: .
      dockerfile: ./notification-api/Dockerfile
    container_name: notification-api
    ports:
      - "8092:8080"
    environment:
      EMAIL_PASS: ${EMAIL_PASS}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
      TARGET_EMAIL: ${TARGET_EMAIL}
  ai-api:
    build:
      context: .
      dockerfile: ./ai-api/Dockerfile
    container_name: ai-api
    ports:
      - "8093:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      OLLAMA_QWEN_HOST: ollama-qwen

volumes:
  postgres_data:
  ollama_qwen_data:

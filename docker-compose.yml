version: '3.8'
services:
  postgres:
    image: postgres:18-alpine
    container_name: tor_container
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
      POSTGRES_DB: tor_db
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d tor_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    container_name: waittor
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy # Ждет, пока база будет реально готова
    environment:
      EMAIL_PASS: ${EMAIL_PASS}
      TOR_LOGIN: ${TOR_LOGIN}
      TOR_PASS: ${TOR_PASS}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASS: ${POSTGRES_PASS}
      PG_HOST: postgres
      PG_PORT: 5432
      TARGET_EMAIL: ${TARGET_EMAIL}

volumes:
  postgres_data:

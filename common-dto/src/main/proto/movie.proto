syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.example.grpc";

// Обертка для списка
message BatchMovieGrpcRequest {
  repeated MovieGrpcRequest movies = 1;
}

message MovieGrpcRequest {
  string name = 1;
  repeated MovieGrpc movies = 2;
}

message MovieGrpc {
  string title = 1;
  string size = 2;
  string link = 3;
}

message EmailResponse {
  string email = 1;
}

service MovieService {
  rpc GetMovieEmail (BatchMovieGrpcRequest) returns (EmailResponse);
}